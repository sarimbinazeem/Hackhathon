services:
  # ── Backend (Node.js + Socket.io + PostgreSQL) ─────────────
  - type: web
    name: ligma-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ligma-db
          property: connectionString
      - key: PORT
        value: 3000

  # ── AI Service (TypeScript) ───────────────────────────────
  - type: web
    name: ligma-ai
    runtime: node
    rootDir: ai-service
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

databases:
  - name: ligma-db
    databaseName: ligma_db
    user: ligma
    plan: free
